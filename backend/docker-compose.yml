version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: nepalikala_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nepalikala}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nepalikala_network

  # Django Admin Panel
  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: nepalikala_django
    environment:
      DEBUG: ${DEBUG:-False}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nepalikala}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./django_admin:/app
      - django_media:/app/media
      - django_static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nepalikala_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py shell -c '
import os
from django.contrib.auth import get_user_model
User = get_user_model()
if not User.objects.filter(email=\"admin@nepalikala.art\").exists():
    User.objects.create_superuser(\"admin@nepalikala.art\", \"admin\", \"admin123\")
    print(\"Superuser created: admin@nepalikala.art / admin123\")' &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60 nepalikala_admin.wsgi:application"

  # FastAPI Backend
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: nepalikala_fastapi
    environment:
      DEBUG: ${DEBUG:-False}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nepalikala}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8080}
    volumes:
      - ./fastapi_api:/app
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nepalikala_network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Nginx Reverse Proxy (optional, for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: nepalikala_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - django_static:/var/www/static
  #     - django_media:/var/www/media
  #   depends_on:
  #     - django
  #     - fastapi
  #   networks:
  #     - nepalikala_network

volumes:
  postgres_data:
  django_media:
  django_static:

networks:
  nepalikala_network:
    driver: bridge
